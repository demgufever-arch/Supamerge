version: '3.9'

services:
  api:
    build: .
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      API_KEY_SECRET: ${API_KEY_SECRET:-your-super-secret-key-change-this}
      CORS_ORIGIN: http://localhost:5173,http://localhost:3000
    volumes:
      - ./src:/app/src
      - ./dist:/app/dist
    command: npm run dev
    networks:
      - gateway

  # Optional: PostgreSQL database (for storing API keys)
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gateway_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gateway

  # Optional: MongoDB (for NoSQL testing)
  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - gateway

volumes:
  postgres_data:
  mongo_data:

networks:
  gateway:
    driver: bridge
